<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
input,textarea,select{-webkit-user-select:auto;user-select:auto}
html,body{height:100%;background:#04060f;overflow:hidden;color:#dde6f0;font-family:system-ui,-apple-system,sans-serif}
body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
#root{height:100vh;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#04060f}::-webkit-scrollbar-thumb{background:#00d4ff33;border-radius:4px}

/* Splash */
#splash{position:fixed;inset:0;background:#04060f;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:18px;transition:opacity .7s ease}
#splash.out{opacity:0;pointer-events:none}
#splash svg{animation:pulse 2s ease-in-out infinite}
#sname{color:#00d4ff;font-size:13px;letter-spacing:5px;font-weight:700;font-family:monospace}
#ssub{color:#8892a4;font-size:10px;letter-spacing:3px;font-family:monospace}

/* Nav */
#nav{background:#04060fee;border-bottom:1px solid rgba(0,212,255,.1);overflow-x:auto;display:flex;align-items:center;gap:2px;padding:0 8px;flex-shrink:0;position:sticky;top:0;z-index:100;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
#nav::-webkit-scrollbar{display:none}
.nhub{width:34px;height:34px;border-radius:50%;border:2px solid #00d4ff;background:rgba(0,212,255,.15);color:#00d4ff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin:6px 4px 6px 0;animation:glow 3s ease-in-out infinite}
.ntab{padding:8px 10px;border:none;border-bottom:2px solid transparent;background:transparent;color:#8892a4;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;letter-spacing:.3px;font-family:inherit;transition:all .2s}
.ntab.on{color:#00d4ff;border-bottom-color:#00d4ff;background:rgba(0,212,255,.1)}

/* Content */
#content{flex:1;padding:14px 14px 40px;overflow-y:auto;-webkit-overflow-scrolling:touch}
@media(min-width:600px){#content{padding:20px 20px 40px}}

/* Panels */
.panel{border:1px solid rgba(0,212,255,.2);border-radius:14px;background:linear-gradient(145deg,#0c1829,#080f1c);margin-bottom:12px;padding:16px}
.panel.green{border-color:rgba(0,255,159,.2)}
.panel.gold{border-color:rgba(245,166,35,.2)}
.panel.red{border-color:rgba(255,59,92,.2)}
.panel.purple{border-color:rgba(180,91,255,.2)}

/* Typography */
.lbl{font-size:10px;font-weight:700;color:#8892a4;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.h1{font-size:19px;font-weight:800;margin-bottom:14px}

/* Inputs */
input,textarea,select{background:#050d1a;color:#dde6f0;border:1px solid rgba(0,212,255,.22);border-radius:8px;padding:9px 12px;font-size:13px;font-family:inherit;outline:none;width:100%;display:block;transition:border-color .2s}
input:focus,textarea:focus,select:focus{border-color:rgba(0,212,255,.6);box-shadow:0 0 0 2px rgba(0,212,255,.12)}
textarea{resize:vertical;min-height:60px}

/* Buttons */
.btn{border:1px solid rgba(0,212,255,.5);background:rgba(0,0,0,.3);color:#00d4ff;border-radius:8px;padding:10px 18px;font-weight:700;cursor:pointer;font-size:12px;letter-spacing:.5px;font-family:inherit;transition:all .2s;box-shadow:0 0 12px rgba(0,212,255,.18)}
.btn:active{opacity:.7}
.btn.g{border-color:rgba(0,255,159,.5);color:#00ff9f;box-shadow:0 0 12px rgba(0,255,159,.18)}
.btn.r{border-color:rgba(255,59,92,.5);color:#ff3b5c;box-shadow:0 0 12px rgba(255,59,92,.18)}
.btn.gold{border-color:rgba(245,166,35,.5);color:#f5a623;box-shadow:0 0 12px rgba(245,166,35,.18)}
.btn.pur{border-color:rgba(180,91,255,.5);color:#b45bff;box-shadow:0 0 12px rgba(180,91,255,.18)}
.btn.w100{width:100%;display:block;text-align:center}
.btn:disabled{opacity:.35;cursor:not-allowed}

/* Stats card */
.sc{padding:13px 14px;border-radius:10px;flex:1;min-width:110px;background:linear-gradient(145deg,#0c1829,#080f1c);border:1px solid rgba(0,212,255,.2)}
.sc .sv{font-family:monospace;font-weight:700;font-size:20px;margin-top:3px}

/* Badge */
.badge{border-radius:12px;padding:3px 10px;font-size:11px;font-weight:700;border:1px solid;letter-spacing:.5px;display:inline-block}

/* Trade row */
.trow{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:8px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);margin-bottom:6px;cursor:pointer;transition:background .15s}
.trow:active{background:rgba(0,212,255,.05)}

/* HUD */
#hud{position:fixed;inset:0;background:#04060f;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
#hud.hidden{display:none}

/* Notification */
#notif{position:fixed;top:70px;right:14px;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;z-index:8000;display:none;max-width:260px;animation:fadein .3s ease;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}

/* Voice chip */
#vchip{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(0,212,255,.12);border:1px solid rgba(0,212,255,.3);border-radius:20px;padding:6px 16px;color:#00d4ff;font-size:12px;font-weight:600;z-index:7000;display:none;max-width:80%;text-align:center}

/* Grid helpers */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.flex{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.mono{font-family:monospace}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}
.muted{color:#8892a4}
.green{color:#00ff9f}.red{color:#ff3b5c}.blue{color:#00d4ff}.gold{color:#f5a623}.pur{color:#b45bff}
.bold{font-weight:700}

/* Scan overlay */
.scan{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.scan::before{content:"";position:absolute;top:-60px;left:0;right:0;height:60px;background:linear-gradient(transparent,rgba(0,212,255,.04),transparent);animation:scanline 10s linear infinite}

/* Animations */
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.65;transform:scale(.96)}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(0,212,255,.3)}50%{box-shadow:0 0 24px rgba(0,212,255,.7)}}
@keyframes fadein{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes scanline{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes arc1{from{stroke-dashoffset:0}to{stroke-dashoffset:-502}}
@keyframes arc2{from{stroke-dashoffset:502}to{stroke-dashoffset:0}}
@keyframes globespin{from{transform:rotate(0deg) scaleY(.32)}to{transform:rotate(360deg) scaleY(.32)}}
@keyframes corepulse{0%,100%{box-shadow:0 0 20px #00d4ff,0 0 50px rgba(0,212,255,.5)}50%{box-shadow:0 0 40px #00d4ff,0 0 90px rgba(0,212,255,.7)}}
@keyframes globepulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes wpulse{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes waveBar{0%,100%{transform:scaleY(1)}50%{transform:scaleY(2.4)}}
@keyframes viewin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes scanh{0%,100%{transform:scaleX(1);opacity:.3}50%{transform:scaleX(.7);opacity:.8}}
@keyframes breatheCore{0%,100%{box-shadow:0 0 22px rgba(0,212,255,.16),inset 0 0 20px rgba(0,212,255,.04)}50%{box-shadow:0 0 55px rgba(0,212,255,.28),inset 0 0 40px rgba(0,212,255,.08)}}
@keyframes breatheGlow{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.15)}}
@keyframes breatheRing{0%,100%{opacity:.15;transform:scale(1)}50%{opacity:.5;transform:scale(1.05)}}
@keyframes nucPulse{0%,100%{box-shadow:0 0 12px #00d4ff,0 0 24px rgba(0,212,255,.6)}50%{box-shadow:0 0 30px #00d4ff,0 0 60px rgba(0,212,255,.8)}}
@keyframes particle0{0%{transform:translate(0,0)}100%{transform:translate(8px,-12px)}}
@keyframes particle1{0%{transform:translate(0,0)}100%{transform:translate(-10px,8px)}}
@keyframes particle2{0%{transform:translate(0,0)}100%{transform:translate(12px,6px)}}
@keyframes particle3{0%{transform:translate(0,0)}100%{transform:translate(-8px,-10px)}}
@keyframes floatDot{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
/* Improved HUD glow */
#hud button:active{opacity:.7;transform:scale(.95)}
/* Better input styling */
input[type=date]{color-scheme:dark}
/* Animated gradient borders on panels */
.panel{transition:border-color .3s}
</style>
</head>

<script>// JARVIS v4 build 20260626-1252

// ═══════════════════════════════════════════════════════════════════════════

var BLUE='#00d4ff',GREEN='#00ff9f',RED='#ff3b5c',GOLD='#f5a623',PURPLE='#b45bff';

// ── UTILS ─────────────────────────────────────────────────────────────────
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
// Unique fingerprint for a trade — used to detect duplicates across screenshots
function tradeFingerprint(t){
  // Use STABLE identifying fields. Entry time is unique per trade (down to the second)
  // and read consistently, unlike long Position IDs which OCR can misread between image slices.
  var sym=String(t.symbol||'').toUpperCase().replace(/[^A-Z0-9]/g,'');
  var et=String(t.entryTime||t.date||'').replace(/[^0-9]/g,'');
  // If we have a full entry timestamp (14 digits YYYYMMDDHHMMSS), that + symbol is unique
  if(et.length>=12)return sym+'@'+et;
  // Fallback: combine everything
  var entry=String(safe(t.entry||0));
  var pnl=String(safe(t.pnl||0));
  var sz=String(safe(t.size||0));
  return sym+'|'+et+'|'+entry+'|'+pnl+'|'+sz;
}
function extractJSONArray(text){if(!text)return null;var t=text.trim();try{var r=JSON.parse(t);return Array.isArray(r)?r:[r];}catch(e){}var s2=t.replace(/```json/gi,"").replace(/```/g,"").trim();try{var r2=JSON.parse(s2);return Array.isArray(r2)?r2:[r2];}catch(e){}var ai=t.indexOf("["),az=t.lastIndexOf("]");if(ai>=0&&az>ai){try{var r3=JSON.parse(t.slice(ai,az+1));if(Array.isArray(r3))return r3;}catch(e){}}var objs=[],depth=0,start=-1,inStr=false,esc=false;for(var i=0;i<t.length;i++){var ch=t[i];if(esc){esc=false;continue;}if(ch==="\\"){esc=true;continue;}if(ch==='"'){inStr=!inStr;continue;}if(inStr)continue;if(ch==="{"){if(depth===0)start=i;depth++;}else if(ch==="}"){depth--;if(depth===0&&start>=0){try{objs.push(JSON.parse(t.slice(start,i+1)));}catch(e){}start=-1;}}}return objs.length?objs:null;}
function safe(v){if(v===null||v===undefined||v==='')return 0;var str=String(v).trim();var neg=false;if(str.indexOf('(')>=0&&str.indexOf(')')>=0)neg=true;str=str.replace(/[$,()\s]/g,'');var n=parseFloat(str);if(isNaN(n))return 0;return neg?-Math.abs(n):n;}
function sortTrades(arr){
  return arr.slice().sort(function(a,b){
    // Use entryTime if available (most precise), else date, else createdAt
    var ta=a.entryTime||a.date||'';
    var tb=b.entryTime||b.date||'';
    if(ta!==tb)return ta<tb?1:-1;
    return (b.createdAt||0)-(a.createdAt||0);
  });
}
function f2(v){return (safe(v)).toFixed(2);}
function fmtU(v){var n=safe(v);return(n>=0?'+$':'-$')+Math.abs(n).toFixed(2);}
function dstr(d){if(!d)return'';var dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});}
function pad2(n){return String(n).padStart(2,'0');}
function today(){return new Date().toISOString().slice(0,10);}
function qs(sel){return document.querySelector(sel);}
function el(tag,cls,html){var e=document.createElement(tag);if(cls)e.className=cls;if(html)e.innerHTML=html;return e;}
function div(cls,html){return el('div',cls,html);}
function span(cls,html){return el('span',cls,html);}
function pivots(h,l,c){
  var pp=(h+l+c)/3;
  return{pp:pp,r1:2*pp-l,r2:pp+(h-l),r3:h+2*(pp-l),s1:2*pp-h,s2:pp-(h-l),s3:l-2*(h-pp),
    ch4:c+(h-l)*1.1/2,ch3:c+(h-l)*1.1/4,cl3:c-(h-l)*1.1/4,cl4:c-(h-l)*1.1/2};
}
// Confluence score: does semis/vix/dollar/breadth agree with NQ's current direction?
function computeConfluence(d){
  var nq=d.NQ;if(!nq)return null;
  var dir=nq.change>0?1:(nq.change<0?-1:0);
  var checks=[];
  // 1. Semis agreeing (SOX preferred, NVDA fallback)
  var semis=d.SOX||d.NVDA;
  if(semis){
    var sdir=semis.change>0?1:(semis.change<0?-1:0);
    checks.push({l:(d.SOX?'Semis (SOX)':'Nvidia')+' agrees w/ NQ',pass:dir===0||sdir===dir,val:(semis.change>=0?'+':'')+f2(semis.change)+'%'});
  }
  // 2. VIX not spiking against the move (>+3% same-day = risk-off warning)
  if(d.VIX){
    checks.push({l:'VIX not spiking',pass:d.VIX.change<3,val:(d.VIX.change>=0?'+':'')+f2(d.VIX.change)+'%'});
  }
  // 3. Dollar not fighting direction (strong USD = headwind for long NQ, tailwind for short)
  if(d.DXY){
    var dxyOk=dir>=0?d.DXY.change<=0.15:d.DXY.change>=-0.15;
    checks.push({l:'Dollar (DXY) not against',pass:dxyOk,val:(d.DXY.change>=0?'+':'')+f2(d.DXY.change)+'%'});
  }
  // 4. ES confirming (broad market agrees, not narrow-breadth move)
  if(d.ES){
    var esdir=d.ES.change>0?1:(d.ES.change<0?-1:0);
    checks.push({l:'S&P (ES) confirms',pass:dir===0||esdir===dir,val:(d.ES.change>=0?'+':'')+f2(d.ES.change)+'%'});
  }
  var score=checks.filter(function(c){return c.pass;}).length;
  return{score:score,max:checks.length,checks:checks,dir:dir};
}
// Trading session from local hour (roughly NY-time oriented; adjust if trading from another tz)
function sessionName(hr){
  if(hr>=4&&hr<9)return'Pre-Market';
  if(hr>=9&&hr<11)return'NY Open';
  if(hr>=11&&hr<15)return'Midday';
  if(hr>=15&&hr<17)return'Power Hour';
  return'Overnight';
}
// Group logged trades by their stamped confluence score → performance per score
function confluenceStats(trades){
  var by={};
  trades.forEach(function(t){
    if(typeof t.confScore!=='number')return;
    var k=t.confScore+'/'+(t.confMax||4);
    if(!by[k])by[k]={n:0,pnl:0,wins:0,score:t.confScore};
    by[k].n++;by[k].pnl+=safe(t.pnl);if(safe(t.pnl)>0)by[k].wins++;
  });
  return by;
}
// Plain-text weekly review for export / prop firm reviews
function buildWeeklyReview(){
  var cutoff=Date.now()-7*86400000;
  var wk=S.trades.filter(function(t){
    var d=new Date((t.date||'')+'T12:00:00');return d.getTime()>=cutoff;
  });
  var L=[];
  L.push('═══ JARVIS WEEKLY REVIEW · '+new Date().toDateString()+' ═══');
  if(!wk.length){L.push('No trades in the last 7 days.');return L.join('\n');}
  var pnl=wk.reduce(function(s,t){return s+safe(t.pnl);},0);
  var wins=wk.filter(function(t){return safe(t.pnl)>0;});
  var losses=wk.filter(function(t){return safe(t.pnl)<0;});
  var wr=Math.round(wins.length/wk.length*100);
  var avgW=wins.length?wins.reduce(function(s,t){return s+safe(t.pnl);},0)/wins.length:0;
  var avgL=losses.length?Math.abs(losses.reduce(function(s,t){return s+safe(t.pnl);},0)/losses.length):0;
  L.push('');
  L.push('Trades: '+wk.length+' · Win rate: '+wr+'% · Net P&L: '+fmtU(pnl));
  L.push('Avg win: '+fmtU(avgW)+' · Avg loss: '+fmtU(-avgL)+(avgL?' · R:R realized: '+(avgW/avgL).toFixed(2):''));
  // By day
  var byDay={};wk.forEach(function(t){if(!byDay[t.date])byDay[t.date]=0;byDay[t.date]+=safe(t.pnl);});
  var days=Object.keys(byDay).sort();
  L.push('');L.push('— Daily —');
  days.forEach(function(d){L.push(d+': '+fmtU(byDay[d]));});
  // Confluence edge
  var cs=confluenceStats(wk);var csk=Object.keys(cs).sort(function(a,b){return cs[b].score-cs[a].score;});
  if(csk.length){
    L.push('');L.push('— Confluence edge —');
    csk.forEach(function(k){var s=cs[k];L.push(k+': '+s.n+' trades, '+Math.round(s.wins/s.n*100)+'% win, '+fmtU(s.pnl));});
  }
  // Sessions
  var byS2={};wk.forEach(function(t){if(!t.session)return;if(!byS2[t.session])byS2[t.session]={n:0,pnl:0};byS2[t.session].n++;byS2[t.session].pnl+=safe(t.pnl);});
  var sk=Object.keys(byS2);
  if(sk.length){L.push('');L.push('— Sessions —');sk.forEach(function(k){L.push(k+': '+byS2[k].n+' trades, '+fmtU(byS2[k].pnl));});}
  // Emotions
  var ei2=emotionImpact(wk);var ek=Object.keys(ei2);
  if(ek.length){
    var worst=ek[0],best=ek[0];
    ek.forEach(function(k){if(ei2[k].pnl<ei2[worst].pnl)worst=k;if(ei2[k].pnl>ei2[best].pnl)best=k;});
    L.push('');L.push('— Psychology —');
    L.push('Best emotion: '+best+' ('+fmtU(ei2[best].pnl)+') · Worst: '+worst+' ('+fmtU(ei2[worst].pnl)+')');
  }
  var tilt=detectTilt(wk);
  if(tilt&&tilt.tilting)L.push('⚠ Tilt detected: sizing up '+(tilt.ratio).toFixed(1)+'x after losses.');
  var dd2=drawdownStatus();
  L.push('');L.push('Drawdown today: '+Math.round(dd2.usedPct)+'% of daily limit used.');
  return L.join('\n');
}

// Step 1: discover which models exist for this key (cached)
var _GC={models:null,key:null};
function _discover(key,cb){
  if(_GC.models&&_GC.key===key){cb(_GC.models);return;}
  fetch('https://generativelanguage.googleapis.com/v1beta/models?key='+encodeURIComponent(key))
    .then(function(r){return r.json();})
    .then(function(data){
      var mods=(data.models||[]).filter(function(m){
        return m.supportedGenerationMethods&&m.supportedGenerationMethods.indexOf('generateContent')>=0;
      }).map(function(m){return m.name.replace('models/','');});
      if(!mods.length)throw new Error('empty');
      _GC={models:mods,key:key};cb(mods);
    })
    .catch(function(){
      // Fallback — try common models
      cb(['gemini-2.0-flash','gemini-2.0-flash-exp','gemini-2.0-flash-lite','gemini-1.5-flash','gemini-1.5-flash-latest','gemini-1.5-pro']);
    });
}
// Step 2: try each model until one works
function _request(key,models,body,onSuccess,onErr){
  var BASE='https://generativelanguage.googleapis.com/v1beta/models/';
  var PROXIES=['','https://corsproxy.io/?','https://api.allorigins.win/raw?url='];
  var mi=0,pi=0,tried=[],lastErr='';
  function next(){
    if(mi>=models.length){onErr('All attempts failed. '+(lastErr||'')+' Tried: '+tried.slice(0,3).join(', '));return;}
    var url=BASE+models[mi]+':generateContent?key='+encodeURIComponent(key);
    var furl=pi===0?url:(PROXIES[pi]+encodeURIComponent(url));
    if(pi===0)tried.push(models[mi]);
    fetch(furl,{method:'POST',headers:{'Content-Type':'application/json'},body:body})
      .then(function(r){return r.text().then(function(t){
        var d;try{d=JSON.parse(t);}catch(e){lastErr='(parse fail)';adv();return;}
        if(!r.ok){
          var em=(d&&d.error&&d.error.message)||('HTTP '+r.status);
          lastErr=em.slice(0,60);
          if(r.status===401||r.status===403){onErr('API key rejected. Get a new key at aistudio.google.com/apikey');return;}
          adv();return;
        }
        // Check if response was blocked or empty
        if(d.candidates&&d.candidates[0]&&d.candidates[0].finishReason==='SAFETY'){lastErr='blocked by safety';adv();return;}
        onSuccess(d);
      });}).catch(function(e){lastErr=(e.message||'network').slice(0,40);adv();});
  }
  function adv(){pi++;if(pi>=PROXIES.length){pi=0;mi++;}next();}
  next();
}
// Public: text call
function geminiCall(system,contents,onSuccess,onErr,maxTokens){
  var key=(S.apiKey||'').replace(/\s/g,'');
  if(!key){onErr('No API key — go to Platforms tab to add your free Gemini key.');return;}
  var all=[];
  if(system){all.push({role:'user',parts:[{text:system}]});all.push({role:'model',parts:[{text:'Understood.'}]});}
  for(var i=0;i<contents.length;i++)all.push(contents[i]);
  var body=JSON.stringify({contents:all,generationConfig:{maxOutputTokens:maxTokens||4096,temperature:0.7}});
  _discover(key,function(models){_request(key,models,body,onSuccess,onErr);});
}

// ── VOICE (SpeechSynthesis) ───────────────────────────────────────────────
var voiceLock=false;
var wakeRec=null;var cmdRec=null;var wakeOn=false;
function speak(text,cb){
  if(S.muted||!window.speechSynthesis){if(cb)cb();return;}
  try{window.speechSynthesis.cancel();}catch(e){}
  var clean=String(text).replace(/[#*_>]/g,'').replace(/\n+/g,'. ').trim();
  var rawParts=clean.match(/[^.!?]+[.!?]+|[^.!?]+$/g)||[clean];
  var chunks=[];var buf='';
  rawParts.forEach(function(part){
    if((buf+part).length>200){if(buf)chunks.push(buf.trim());buf=part;}
    else buf+=part;
  });
  if(buf.trim())chunks.push(buf.trim());
  if(!chunks.length){if(cb)cb();return;}
  var voices=[];try{voices=window.speechSynthesis.getVoices()||[];}catch(e){}
  var voice=null;
  if(S.voiceName){voice=voices.find(function(v){return v.name===S.voiceName;});}
  if(!voice){
    var prefs=[function(v){return /siri/i.test(v.name)&&v.lang.indexOf('en')===0;},function(v){return /\(premium\)/i.test(v.name)&&/^en/.test(v.lang);},function(v){return /\(enhanced\)/i.test(v.name)&&/^en/.test(v.lang)&&!/daniel/i.test(v.name);},function(v){return v.lang==='en-GB';},function(v){return v.lang.indexOf('en')===0;}];
    for(var pi=0;pi<prefs.length;pi++){voice=voices.find(prefs[pi]);if(voice)break;}
  }
  setVState('speaking');
  var ci=0;
  var resumeTimer=setInterval(function(){try{if(window.speechSynthesis.paused)window.speechSynthesis.resume();}catch(e){}},250);
  function speakNext(){
    if(ci>=chunks.length){clearInterval(resumeTimer);setVState('idle');if(cb)cb();return;}
    var u=new SpeechSynthesisUtterance(chunks[ci]);ci++;
    u.rate=0.97;u.pitch=0.92;u.volume=1;
    if(voice){u.voice=voice;if(/siri|premium/i.test(voice.name)){u.pitch=0.96;u.rate=1.0;}else if(/enhanced/i.test(voice.name)){u.pitch=0.9;u.rate=0.95;}}
    u.onend=function(){speakNext();};
    u.onerror=function(){speakNext();};
    try{window.speechSynthesis.speak(u);}catch(e){speakNext();}
  }
  setTimeout(speakNext,60);
}

// Wake word
function startWake(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){notify('Wake word needs Safari or Chrome.',RED);return;}
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(){
    function launch(){
      if(!wakeOn)return;
      var r=new SR();r.lang='en-US';r.continuous=true;r.interimResults=true;r.maxAlternatives=1;
      wakeRec=r;
      r.onresult=function(ev){
        for(var i=ev.resultIndex;i<ev.results.length;i++){
          var t=ev.results[i][0].transcript.toLowerCase().trim();
          var wakeIdx=t.indexOf('hey jarvis');
          if(wakeIdx<0)wakeIdx=t.indexOf('hey travis');
          if(wakeIdx<0)wakeIdx=t.indexOf('hi jarvis');
          if(wakeIdx>=0){
            // Extract any command spoken AFTER the wake word in the same breath
            var afterWake=t.slice(wakeIdx+10).replace(/^[,. ]+/,'').trim();
            try{r.abort();}catch(e){}wakeRec=null;
            showHUD(true);
            if(afterWake.length>2){
              // Command was said in the same breath — process it directly
              setVState('listening');
              speak('Sir.',function(){handleCmd(afterWake);});
            } else {
              speak('Yes Sir?',function(){listenOnce();});
            }
            break;
          }
        }
      };
      r.onend=function(){if(wakeOn&&!wakeRec)setTimeout(launch,300);};
      r.onerror=function(ev){if(ev.error==='not-allowed'){wakeOn=false;S.wakeOn=false;notify('Mic access denied.',RED);}else if(wakeOn)setTimeout(launch,400);};
      try{r.start();}catch(e){if(wakeOn)setTimeout(launch,500);}
    }
    launch();
  }).catch(function(){notify('Microphone access denied. Allow mic in Safari settings.',RED);});
}
function toggleWake(){
  wakeOn=!wakeOn;S.wakeOn=wakeOn;
  if(wakeOn){startWake();}else{if(wakeRec){try{wakeRec.abort();}catch(e){}}wakeRec=null;}
  renderHUD();renderNav();
}
function listenOnce(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){notify('Speech recognition unavailable.',RED);return;}
  if(wakeRec){try{wakeRec.abort();}catch(e){}}wakeRec=null;
  if(cmdRec){try{cmdRec.abort();}catch(e){}}
  var r=new SR();r.lang='en-US';r.interimResults=false;r.maxAlternatives=1;
  cmdRec=r;setVState('listening');showVChip('Listening...');
  var heard=false;

function handleCmd(t){

// Tilt detection — is size increasing after losses?
function detectTilt(trades){
  var t=sortTrades(trades).slice().reverse(); // oldest first
  if(t.length<4)return null;
  var recent=t.slice(-10);
  var sizeAfterLoss=[],sizeAfterWin=[];
  for(var i=1;i<recent.length;i++){
    var prevPnl=safe(recent[i-1].pnl);var sz=safe(recent[i].size);
    if(sz<=0)continue;
    if(prevPnl<0)sizeAfterLoss.push(sz);else if(prevPnl>0)sizeAfterWin.push(sz);
  }
  if(!sizeAfterLoss.length||!sizeAfterWin.length)return null;
  var avgLoss=sizeAfterLoss.reduce(function(s,x){return s+x;},0)/sizeAfterLoss.length;
  var avgWin=sizeAfterWin.reduce(function(s,x){return s+x;},0)/sizeAfterWin.length;
  var ratio=avgWin?avgLoss/avgWin:1;
  return{ratio:ratio,tilting:ratio>1.3,avgAfterLoss:avgLoss,avgAfterWin:avgWin};
}

function dayOfWeekStats(trades){

// ═══ JARVIS ORB — chaotic golden data-hologram (broken arcs, glyph blocks, debris) ═══
function createOrb(size){
  var c=document.createElement('canvas');
  var dpr=Math.min(window.devicePixelRatio||1,2);
  c.width=size*dpr;c.height=size*dpr;
  c.style.cssText='width:'+size+'px;height:'+size+'px;display:block;margin:0 auto';
  var ctx=c.getContext('2d');
  var R=size*0.34;
  // ── Build the three ingredient types the reference photo is made of ──
  var arcs=[],blocks=[],dust=[];
  // 1) Broken circuit-trace arcs: fragments on MANY randomly tilted rings
  var NR=26; // number of distinct ring planes
  for(var ri=0;ri<NR;ri++){
    var tiltX=(Math.random()-0.5)*1.6,tiltY=(Math.random()-0.5)*1.6;
    var rr=R*(0.45+Math.random()*0.75); // some rings poke outside the sphere — ragged edge
    var frags=2+Math.floor(Math.random()*5);
    for(var fi=0;fi<frags;fi++){
      arcs.push({
        tx:tiltX,ty:tiltY,r:rr,
        a:Math.random()*Math.PI*2,
        span:0.06+Math.random()*0.55,          // short dash … longer trace
        w:Math.random()<0.25?1.8:0.9,          // few thick traces
        spd:(Math.random()-0.5)*0.006,          // each fragment drifts along its ring
        tw:Math.random()*Math.PI*2,
        bright:Math.random()
      });
    }
  }
  // 2) Rectangular data-blocks / circuit glyphs scattered through the shell
  for(var bi=0;bi<70;bi++){
    var u=Math.random()*2-1,th=Math.random()*Math.PI*2,s2=Math.sqrt(1-u*u);
    blocks.push({
      x:s2*Math.cos(th),y:s2*Math.sin(th),z:u,
      r:R*(0.5+Math.random()*0.65),
      w:(1+Math.random()*4),h:(0.8+Math.random()*2.4),
      tw:Math.random()*Math.PI*2,fl:Math.random()
    });
  }
  // 3) Fine debris dust — including strays well outside the sphere (the messy silhouette)
  for(var di=0;di<170;di++){
    var u2=Math.random()*2-1,th2=Math.random()*Math.PI*2,s3=Math.sqrt(1-u2*u2);
    dust.push({
      x:s3*Math.cos(th2),y:s3*Math.sin(th2),z:u2,
      r:R*(0.4+Math.pow(Math.random(),0.6)*0.95), // biased outward, some far strays
      sz:Math.random()*1.1+0.3,tw:Math.random()*Math.PI*2,spd:0.5+Math.random()
    });
  }
  var rot=0,rot2=0,stopped=false,frame=0;
  function rotP(x,y,z,cosA,sinA,cosB,sinB){
    var x1=x*cosA-z*sinA,z1=x*sinA+z*cosA;
    var y1=y*cosB-z1*sinB,z2=y*sinB+z1*cosB;
    return[x1,y1,z2];
  }
  function draw(){
    if(stopped)return;
    if(!c.isConnected){stopped=true;return;}
    frame++;
    var speaking=false;
    try{speaking=window.speechSynthesis&&window.speechSynthesis.speaking;}catch(e){}
    var energy=speaking?1.7:1;
    rot+=0.0035*energy;rot2+=0.0015*energy;
    var w=c.width,h2=c.height,cx=w/2,cy=h2/2,sc=dpr;
    ctx.clearRect(0,0,w,h2);
    var cosA=Math.cos(rot),sinA=Math.sin(rot),cosB=Math.cos(rot2),sinB=Math.sin(rot2);
    // ── Core: bright swirl center like the photo ──
    var coreR=R*0.22*sc*(1+(speaking?Math.sin(frame*0.16)*0.14:Math.sin(frame*0.045)*0.05));
    var g=ctx.createRadialGradient(cx,cy,0,cx,cy,coreR*3);
    g.addColorStop(0,'rgba(255,240,200,'+(speaking?0.95:0.8)+')');
    g.addColorStop(0.2,'rgba(255,190,80,0.5)');
    g.addColorStop(0.55,'rgba(230,140,30,0.16)');
    g.addColorStop(1,'rgba(230,140,30,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,coreR*3,0,Math.PI*2);ctx.fill();
    // inner swirl stroke
    ctx.strokeStyle='rgba(255,215,140,0.5)';ctx.lineWidth=1.1*sc;
    ctx.beginPath();
    for(var sw=0;sw<24;sw++){
      var sa=frame*0.02+sw*0.28,sr=coreR*(0.3+sw*0.055);
      var px=cx+Math.cos(sa)*sr,py=cy+Math.sin(sa)*sr*0.7;
      sw===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
    ctx.stroke();
    // ── Broken arc fragments (the circuit traces) ──
    ctx.lineCap='round';
    for(var i=0;i<arcs.length;i++){
      var A=arcs[i];
      A.a+=A.spd*energy;
      var ct=Math.cos(A.tx),st=Math.sin(A.tx),ct2=Math.cos(A.ty),st2=Math.sin(A.ty);
      var STEPS=A.span>0.3?4:2;
      var flick=0.5+0.5*Math.sin(frame*0.07+A.tw);
      var pts2=[],zsum=0;
      for(var s4=0;s4<=STEPS;s4++){
        var ang=A.a+A.span*(s4/STEPS);
        // point on tilted ring
        var x0=Math.cos(ang)*A.r,y0=Math.sin(ang)*A.r*st,z0=Math.sin(ang)*A.r*ct;
        var y3=y0*ct2-z0*st2,z3=y0*st2+z0*ct2;
        var pr=rotP(x0,y3,z3,cosA,sinA,cosB,sinB);
        pts2.push([cx+pr[0]*sc,cy+pr[1]*sc]);
        zsum+=pr[2];
      }
      var depth=((zsum/(STEPS+1))/R+1)/2;
      var al=(0.08+depth*0.7)*(0.4+0.6*flick)*(0.5+A.bright*0.5);
      ctx.strokeStyle=A.bright>0.75&&depth>0.6?'rgba(255,235,185,'+Math.min(1,al*1.3)+')':'rgba(242,'+(120+Math.round(depth*90))+',30,'+al+')';
      ctx.lineWidth=A.w*sc*(0.5+depth*0.7)*(speaking?1.2:1);
      ctx.beginPath();
      ctx.moveTo(pts2[0][0],pts2[0][1]);
      for(var s5=1;s5<pts2.length;s5++)ctx.lineTo(pts2[s5][0],pts2[s5][1]);
      ctx.stroke();
    }
    // ── Data blocks / glyphs ──
    for(var b2=0;b2<blocks.length;b2++){
      var B=blocks[b2];
      var pr2=rotP(B.x*B.r,B.y*B.r,B.z*B.r,cosA,sinA,cosB,sinB);
      var depth2=(pr2[2]/R+1)/2;
      var fl2=B.fl>0.7?(Math.sin(frame*0.12+B.tw)>0.2?1:0.15):1; // some blocks blink hard
      var al2=(0.1+depth2*0.65)*fl2;
      if(al2<0.03)continue;
      var bw=B.w*sc*(0.5+depth2*0.8),bh=B.h*sc*(0.5+depth2*0.8);
      ctx.fillStyle=depth2>0.78?'rgba(255,225,165,'+al2+')':'rgba(240,150,35,'+al2+')';
      ctx.fillRect(cx+pr2[0]*sc-bw/2,cy+pr2[1]*sc-bh/2,bw,bh);
    }
    // ── Debris dust ──
    for(var d3=0;d3<dust.length;d3++){
      var D=dust[d3];
      var pr3=rotP(D.x*D.r,D.y*D.r,D.z*D.r,cosA,sinA,cosB,sinB);
      var depth3=(pr3[2]/R+1)/2;
      var twk=0.5+0.5*Math.sin(frame*0.09*D.spd+D.tw);
      var al3=(0.06+depth3*0.55)*twk;
      ctx.fillStyle='rgba(250,'+(150+Math.round(depth3*70))+',50,'+al3+')';
      var dz=D.sz*sc*(0.5+depth3*0.7);
      ctx.fillRect(cx+pr3[0]*sc,cy+pr3[1]*sc,dz,dz);
    }
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
  return c;
}

function viewSync(){
  var wrap=div('');
  var h=div('h1');h.style.color=GREEN;h.textContent='⟳ AI Trade Import';wrap.appendChild(h);
  // ── BACKUP & RESTORE — everything lives in localStorage; protect it ──
  var bkP=div('panel');bkP.style.cssText='padding:14px 16px;margin-bottom:12px;border-color:rgba(0,212,255,.25)';
  var bkL=div('lbl');bkL.textContent='🛡 Backup & Restore';bkP.appendChild(bkL);
  var bkT=div('');bkT.style.cssText='font-size:11px;color:#8892a4;line-height:1.5;margin-bottom:10px';
  bkT.textContent='All JARVIS data (trades, memory, bias history, settings) lives on this device. Export a backup regularly — if Safari ever clears site data, this is your only protection.';
  bkP.appendChild(bkT);
  var bkRow=div('');bkRow.style.cssText='display:flex;gap:8px';
  var expB=btn('⬇ Export Backup',BLUE,function(){
    var dump={_jarvis:'backup',_version:'4.1',_exported:new Date().toISOString(),data:{}};
    for(var i=0;i<localStorage.length;i++){
      var k=localStorage.key(i);
      if(k&&k.indexOf('jv_')===0)dump.data[k]=localStorage.getItem(k);
    }
    var blob=new Blob([JSON.stringify(dump)],{type:'application/json'});
    var a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='jarvis-backup-'+today()+'.json';
    document.body.appendChild(a);a.click();
    setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(a.href);},500);
    notify('Backup exported — save it to Files/iCloud.',GREEN);
  });
  expB.style.flex='1';
  var impInput=document.createElement('input');
  impInput.type='file';impInput.accept='.json,application/json';impInput.style.display='none';
  impInput.onchange=function(){
    var f=impInput.files[0];if(!f)return;
    var rd=new FileReader();
    rd.onload=function(){
      try{
        var dump=JSON.parse(rd.result);
        if(dump._jarvis!=='backup'||!dump.data){notify('Not a JARVIS backup file.',RED);return;}
        var n=Object.keys(dump.data).length;
        if(!confirm('Restore backup from '+(dump._exported||'unknown date')+'? This REPLACES current data ('+n+' keys). Current trades: '+S.trades.length+'.'))return;
        Object.keys(dump.data).forEach(function(k){
          if(k.indexOf('jv_')===0)localStorage.setItem(k,dump.data[k]);
        });
        notify('Backup restored — reloading...',GREEN);
        setTimeout(function(){location.reload();},900);
      }catch(e){notify('Could not read backup file.',RED);}
    };
    rd.readAsText(f);
  };
  var impB=btn('⬆ Restore',GOLD,function(){impInput.click();});
  impB.style.flex='1';
  bkRow.appendChild(expB);bkRow.appendChild(impB);
  bkP.appendChild(bkRow);bkP.appendChild(impInput);
  var bkMeta=div('');bkMeta.style.cssText='font-size:9px;color:#3d4f66;margin-top:8px;font-family:monospace';
  var lastBk=loadStr('jv_lastbackup','');
  bkMeta.textContent=lastBk?'Last backup: '+lastBk:'No backup recorded on this device yet.';
  bkP.appendChild(bkMeta);
  expB.addEventListener('click',function(){saveStr('jv_lastbackup',today());});

    if(S.aiMemory.length){
      ctx+='\nMEMORY (facts you know about this trader from past sessions — use them naturally, do not recite the list): ';
      ctx+=S.aiMemory.slice(-15).map(function(m){return m.note;}).join(' | ');

    var _rec2=biasRecord();
    if(_rec2)ctx+='\nYour own bias-call record: '+_rec2.hits+'/'+_rec2.total+' recent calls correct. Be honest about it if asked.';
    var msgs=S.aiChat.map(function(m){return{role:m.role==='assistant'?'model':'user',parts:[{text:m.content}]};});
    var _t=setTimeout(function(){
      S.aiChat.push({role:'assistant',content:'Request timed out Sir. Please check your internet connection.'});
      S.aiLoad=false;navigate('ai');
    },35000);
    geminiCall(sys+'\n\n'+ctx,msgs,function(data){
      clearTimeout(_t);
      var reply=geminiText(data)||'Systems need a moment Sir.';
      S.aiChat.push({role:'assistant',content:reply});
      S.aiLoad=false;navigate('ai');
      if(!S.muted)speak(reply.replace(/[#*_]/g,'').slice(0,500),null);

    },function(err){
      clearTimeout(_t);
      S.aiChat.push({role:'assistant',content:'Connection error Sir: '+err+'\nCheck API key in Platforms tab.'});
      S.aiLoad=false;navigate('ai');
    });
  }
  return wrap;
}

// After a chat exchange, extract durable facts worth remembering (one cheap call)
function extractMemory(userText,replyText){
  if(!S.apiKey)return;
  var sys='Extract durable facts about this trader worth remembering across sessions: commitments they made, recurring patterns, stated preferences, goals, rules. Output ONLY a JSON array of short strings (max 2 items), [] if nothing durable. NO generic trading advice, NO one-off market commentary. Example: ["Committed to max 3 trades per day","Struggles with revenge trading after midday losses"]';
  geminiCall(sys,[{role:'user',parts:[{text:'Trader said: '+userText.slice(0,500)+'\nJARVIS replied: '+replyText.slice(0,500)}]}],function(data){
    var txt=(geminiText(data)||'').replace(/```json|```/g,'').trim();
    try{
      var arr=JSON.parse(txt);
      if(Array.isArray(arr)&&arr.length){
        arr.slice(0,2).forEach(function(note){
          note=String(note).slice(0,180);

// Resolve past bias calls against what NQ actually did (4h–36h after the call)
function resolveBiasOutcomes(){
  var nq=S.mktData.NQ;if(!nq)return;
  var changed=false;
  S.biasHist.forEach(function(h2){
    if(h2.result)return;
    var age=Date.now()-h2.ts;
    if(age<14400000||age>129600000){if(age>129600000){h2.result='expired';changed=true;}return;}
    if(!h2.priceAt)return;
    var movePct=(nq.price-h2.priceAt)/h2.priceAt*100;
    if(Math.abs(movePct)<0.1){h2.result='flat';}
    else if((h2.day==='BULLISH'&&movePct>0)||(h2.day==='BEARISH'&&movePct<0)){h2.result='hit';}
    else if(h2.day==='NEUTRAL'){h2.result=Math.abs(movePct)<0.4?'hit':'miss';}
    else{h2.result='miss';}
    h2.movePct=Math.round(movePct*100)/100;
    changed=true;
  });
  if(changed)save('jv_biashist',S.biasHist);
}
// Summary of JARVIS's own recent bias track record
function biasRecord(){
  var resolved=S.biasHist.filter(function(h2){return h2.result==='hit'||h2.result==='miss';}).slice(-20);
  if(resolved.length<3)return null;
  var hits=resolved.filter(function(h2){return h2.result==='hit';}).length;
  return{hits:hits,total:resolved.length,
    recentMisses:resolved.filter(function(h2){return h2.result==='miss';}).slice(-3).map(function(h2){return h2.day+' call on '+new Date(h2.ts).toLocaleDateString()+' (NQ went '+(h2.movePct>=0?'+':'')+h2.movePct+'%)';})};
}

// Structured bias generation — one Gemini call, JSON out, grounded in JARVIS's own signals
function generateBias(){
  if(S.biasLoad)return;
  if(!S.apiKey){notify('Add Gemini API key in Platforms.',GOLD);return;}
  S.biasLoad=true;if(S.view==='bias')navigate('bias');
  function buildCtx(){
    var d=S.mktData.NQ;
    var c='Instrument: NQ (Nasdaq 100 futures). Date: '+new Date().toDateString()+'.\n';
    if(d){
      var p=pivots(d.h,d.l,d.c);
      c+='Price '+f2(d.price)+' ('+(d.change>=0?'+':'')+f2(d.change)+'%). Pivots: R2 '+f2(p.r2)+', R1 '+f2(p.r1)+', PP '+f2(p.pp)+', S1 '+f2(p.s1)+', S2 '+f2(p.s2)+'.\n';
    }
    var cf=computeConfluence(S.mktData);
    if(cf&&cf.max)c+='Confluence '+cf.score+'/'+cf.max+': '+cf.checks.map(function(x){return x.l+' '+(x.pass?'YES':'NO')+' ('+x.val+')';}).join('; ')+'.\n';
    if(S.nqSoxCorr!==null)c+='20-day NQ-SOX correlation: '+S.nqSoxCorr.toFixed(2)+'.\n';
    var ne=nextEcoEvent(480);
    if(ne)c+='Upcoming: '+ne.title+' ('+ne.impact+') in '+Math.round((ne.ts-Date.now())/60000)+' min.\n';
    ['SOX','NVDA','VIX','DXY','TNX','ES'].forEach(function(k){var x=S.mktData[k];if(x)c+=k+' '+(x.change>=0?'+':'')+f2(x.change)+'%. ';});
    return c;
  }
  var maybeFetch=Object.keys(S.mktData).length?function(cb){cb();}:function(cb){fetchMkt();var n=0;var iv=setInterval(function(){n++;if(Object.keys(S.mktData).length||n>16){clearInterval(iv);cb();}},500);};
  maybeFetch(function(){
    resolveBiasOutcomes();
    var rec=biasRecord();
    var sys='You are JARVIS, elite NQ futures analyst. Given live market data, output ONLY valid JSON (no markdown, no fences, no commentary):\n'+
      '{"day":"BULLISH|BEARISH|NEUTRAL","swing":"BULLISH|BEARISH|NEUTRAL","confidence":1-10,"summary":"one sentence headline like a news ticker","supports":["reason 1","reason 2","reason 3"],"flips":["what could flip it 1","what could flip it 2"],"keyLevels":{"target":"number","resistance":"number","support":"number"}}\n'+
      'Supports/flips must be specific to the data provided (confluence checks, correlations, events, levels), not generic filler. Numbers as plain strings.';
    if(rec)sys+='\nYOUR OWN TRACK RECORD (learn from it): '+rec.hits+'/'+rec.total+' recent calls correct.'+(rec.recentMisses.length?' Recent misses: '+rec.recentMisses.join('; ')+'. Adjust confidence accordingly — be humbler where you have been wrong.':'');
    geminiCall(sys,[{role:'user',parts:[{text:buildCtx()}]}],function(data){
      var txt=(geminiText(data)||'').replace(/```json|```/g,'').trim();
      try{
        var j=JSON.parse(txt);
        if(j&&j.day){
          S.biasData={ts:Date.now(),day:String(j.day).toUpperCase(),swing:String(j.swing||j.day).toUpperCase(),
            confidence:Math.max(1,Math.min(10,parseInt(j.confidence)||5)),summary:String(j.summary||''),
            supports:Array.isArray(j.supports)?j.supports.slice(0,4).map(String):[],
            flips:Array.isArray(j.flips)?j.flips.slice(0,4).map(String):[],
            keyLevels:j.keyLevels&&typeof j.keyLevels==='object'?j.keyLevels:{}};
          var _cfNow=computeConfluence(S.mktData);
          S.biasData.confAt=_cfNow&&_cfNow.max?_cfNow.score:null;
          save('jv_bias',S.biasData);
          // Record the call so it can be scored later
          S.biasHist.push({ts:Date.now(),day:S.biasData.day,swing:S.biasData.swing,confidence:S.biasData.confidence,priceAt:S.mktData.NQ?S.mktData.NQ.price:null});
          if(S.biasHist.length>60)S.biasHist=S.biasHist.slice(-60);
          save('jv_biashist',S.biasHist);
        }else notify('Bias response malformed — try again.',GOLD);
      }catch(e){notify('Could not parse bias — try again.',GOLD);}
      S.biasLoad=false;if(S.view==='bias')navigate('bias');
    },function(err){
      S.biasLoad=false;notify('Bias failed: '+err,RED);if(S.view==='bias')navigate('bias');
    });
  });
}

function fetchNews(force){
  if(S.newsLoad)return;
  if(!force&&Date.now()-S.newsLastFetch<300000&&S.newsItems.length)return; // 5 min throttle
  S.newsLoad=true;if(S.view==='bias')navigate('bias');
  var PROXIES=['https://corsproxy.io/?','https://api.allorigins.win/raw?url=','https://api.codetabs.com/v1/proxy?quest='];
  var FEEDS=['https://www.cnbc.com/id/20910258/device/rss/rss.html','https://feeds.a.dj.com/rss/RSSMarketsMain.xml'];
  var fi=0;
  function tryFeed(){
    if(fi>=FEEDS.length){S.newsLoad=false;if(!S.newsItems.length)notify('News feeds unreachable.',GOLD);if(S.view==='bias')navigate('bias');return;}
    var feed=FEEDS[fi];fi++;
    var pi=0;
    function tryP(){
      if(pi>=PROXIES.length){tryFeed();return;}
      fetch(PROXIES[pi]+encodeURIComponent(feed),{cache:'no-store'}).then(function(r){
        pi++;
        if(!r.ok){tryP();return;}
        r.text().then(function(xml){
          try{
            var doc=new DOMParser().parseFromString(xml,'text/xml');
            var items=doc.querySelectorAll('item');
            if(!items.length){tryP();return;}
            var out=[];
            for(var i=0;i<Math.min(items.length,10);i++){
              var t2=items[i].querySelector('title'),pd=items[i].querySelector('pubDate');
              if(t2&&t2.textContent)out.push({title:t2.textContent.trim(),ts:pd?new Date(pd.textContent).getTime():Date.now(),impact:null,note:null});
            }
            if(!out.length){tryP();return;}
            S.newsItems=out;S.newsLastFetch=Date.now();S.newsLoad=false;
            if(S.view==='bias')navigate('bias');
            annotateNews();
          }catch(e){tryP();}
        }).catch(function(){tryP();});
      }).catch(function(){pi++;tryP();});
    }
    tryP();
  }
  tryFeed();
}

  geminiCall(sys,[{role:'user',parts:[{text:list}]}],function(data){

function fetchMkt(){
  S.mktErr='';
  // Use Stooq (reliable CSV, CORS-friendly) + Yahoo fallback
  var SYMS={ES:'^spx',NQ:'^ndx',XAU:'xauusd',VIX:'^vix',NVDA:'nvda.us'};        // Stooq symbols (subset — others fall through to Yahoo)
  var YSYMS={ES:'ES=F',NQ:'NQ=F',XAU:'GC=F',SOX:'^SOX',NVDA:'NVDA',VIX:'^VIX',DXY:'DX-Y.NYB',TNX:'^TNX'};          // Yahoo fallback
  var LBLS={ES:'S&P 500',NQ:'Nasdaq',XAU:'Gold',SOX:'Semis (SOX)',NVDA:'Nvidia',VIX:'VIX',DXY:'Dollar (DXY)',TNX:'10Y Yield'};
  var done=0,out={},keys=['ES','NQ','XAU','SOX','NVDA','VIX','DXY','TNX'];
  var PROXIES=['https://corsproxy.io/?','https://api.allorigins.win/raw?url=','https://api.codetabs.com/v1/proxy?quest='];

  function parseStooq(csv){
    // CSV header: Symbol,Date,Time,Open,High,Low,Close,Volume
    try{
      var lines=csv.trim().split('\n');if(lines.length<2)return null;
      var cols=lines[1].split(',');
      var o=parseFloat(cols[3]),h=parseFloat(cols[4]),l=parseFloat(cols[5]),c=parseFloat(cols[6]);
      if(!c||isNaN(c))return null;
      return{price:c,o:o||c,h:h||c,l:l||c,c:o||c,change:o?parseFloat(((c-o)/o*100).toFixed(2)):0};
    }catch(e){return null;}
  }
  function parseYahoo(t){
    try{
      var j=JSON.parse(t);var res=j&&j.chart&&j.chart.result&&j.chart.result[0];if(!res)return null;
      var meta=res.meta||{};var price=meta.regularMarketPrice||0;if(!price)return null;
      var prev=meta.chartPreviousClose||meta.regularMarketPreviousClose||price;
      var q=res.indicators&&res.indicators.quote&&res.indicators.quote[0];
      var highs=q&&q.high?q.high.filter(function(x){return x&&x>0;}):[];
      var lows=q&&q.low?q.low.filter(function(x){return x&&x>0;}):[];
      var opens=q&&q.open?q.open.filter(function(x){return x&&x>0;}):[];
      return{price:price,o:opens.length?opens[opens.length-1]:prev,
        h:highs.length?Math.max.apply(null,highs.slice(-3)):price,
        l:lows.length?Math.min.apply(null,lows.slice(-3)):price,
        c:prev,change:prev?parseFloat(((price-prev)/prev*100).toFixed(2)):0};
    }catch(e){return null;}
  }
  function fetchVia(url,parser,cb2){
    var pi=0;
    function tryP(){
      if(pi>=PROXIES.length){cb2(null);return;}
      var fu=PROXIES[pi]+encodeURIComponent(url);pi++;
      fetch(fu,{cache:'no-store'}).then(function(r){
        if(!r.ok){tryP();return;}
        r.text().then(function(t){var rx=parser(t);if(rx&&rx.price>0)cb2(rx);else tryP();}).catch(function(){tryP();});
      }).catch(function(){tryP();});
    }
    tryP();
  }
  function fetchOne(key,cb2){
    function viaYahoo(){
      var yUrl='https://query1.finance.yahoo.com/v8/finance/chart/'+YSYMS[key]+'?interval=1d&range=5d';
      fetchVia(yUrl,parseYahoo,cb2);
    }
    if(!SYMS[key]){viaYahoo();return;} // no Stooq symbol mapped — go straight to Yahoo
    var stooqUrl='https://stooq.com/q/l/?s='+SYMS[key]+'&f=sd2t2ohlcv&h&e=csv';
    fetchVia(stooqUrl,parseStooq,function(res){
      if(res){cb2(res);return;}
      viaYahoo(); // Fallback to Yahoo
    });
  }
  keys.forEach(function(k){
    fetchOne(k,function(result){
      if(result){
        if(k==='TNX')result.price=result.price/10,result.o=result.o/10,result.h=result.h/10,result.l=result.l/10,result.c=result.c/10; // Yahoo quotes 10Y yield x10
        out[k]=result;
      }
      done++;
      if(done<keys.length)return;
      if(Object.keys(out).length){
        S.mktData=out;S.mktLastFetch=Date.now();S.mktErr='';
        S.mktStatus=keys.filter(function(k2){return out[k2];}).map(function(k2){var d=out[k2];return LBLS[k2]+' '+f2(d.price)+(d.change>=0?' +':' ')+f2(d.change)+'%';}).join('  ·  ');
        checkDivergence();
        resolveBiasOutcomes();
        // Record confluence history (throttled: one point per minute max)
        var _cfh=computeConfluence(out);
        if(_cfh&&_cfh.max){
          var last=S.confHist[S.confHist.length-1];
          if(!last||Date.now()-last.t>60000){
            S.confHist.push({t:Date.now(),s:_cfh.score,m:_cfh.max});
            if(S.confHist.length>300)S.confHist=S.confHist.slice(-300);
            save('jv_confhist',S.confHist);
          }
        }
        fetchCorr();
        // Regime-shift detector: bias exists, confluence moved 2+ points since it was generated → refresh it
        if(S.biasData&&typeof S.biasData.confAt==='number'&&_cfh&&_cfh.max&&!S.biasLoad&&S.apiKey){
          var shift=Math.abs(_cfh.score-S.biasData.confAt);
          var biasAge=Date.now()-S.biasData.ts;
          if(shift>=2&&biasAge>900000){ // regime changed and bias is >15 min old
            notify('⚖ Confluence shifted '+S.biasData.confAt+'→'+_cfh.score+' — updating bias',PURPLE);
            generateBias();
          }
        }
      } else {
        S.mktErr='Live prices unavailable right now. AI briefing still works using market knowledge.';
      }
      fetchEcoCal();
      if(S.view==='markets')navigate('markets');
    });
  });
}

function fetchEcoCal(){
  // Refresh hourly normally, but every 10 min when an event is within ±90 min (to catch releases)
  var nearEvent=S.ecoEvents.some(function(e){return Math.abs(e.ts-Date.now())<5400000;});
  var throttle=nearEvent?600000:3600000;
  if(Date.now()-S.ecoLastFetch<throttle&&S.ecoEvents.length)return;
  var PROXIES=['https://corsproxy.io/?','https://api.allorigins.win/raw?url=','https://api.codetabs.com/v1/proxy?quest='];
  var url='https://nfs.faireconomy.media/ff_calendar_thisweek.json';
  var pi=0;
  function tryP(){
    if(pi>=PROXIES.length+1)return;
    // try direct first (feed is usually CORS-open), then proxies
    var fu=pi===0?url:PROXIES[pi-1]+encodeURIComponent(url);pi++;
    fetch(fu,{cache:'no-store'}).then(function(r){
      if(!r.ok){tryP();return;}
      r.json().then(function(arr){
        if(!Array.isArray(arr)||!arr.length){tryP();return;}
        S.ecoEvents=arr.filter(function(e){
          return e&&e.country==='USD'&&(e.impact==='High'||e.impact==='Medium');
        }).map(function(e){
          return{title:e.title,impact:e.impact,ts:new Date(e.date).getTime(),forecast:e.forecast||'',previous:e.previous||'',actual:e.actual||''};
        }).filter(function(e){return e.ts&&!isNaN(e.ts);});
        S.ecoLastFetch=Date.now();
        checkEcoOutcomes();
      }).catch(function(){tryP();});
    }).catch(function(){tryP();});
  }
  tryP();
}
// Returns the next USD event within `windowMin` minutes, or null
function nextEcoEvent(windowMin){
  var now=Date.now(),best=null;
  S.ecoEvents.forEach(function(e){
    var dm=(e.ts-now)/60000;
    if(dm>0&&dm<=windowMin&&(!best||e.ts<best.ts))best=e;
  });
  return best;
}
// Banner node for an imminent high/medium-impact event (or null)
function ecoBanner(){
  var ev=nextEcoEvent(60);
  if(!ev)return null;
  var mins=Math.max(1,Math.round((ev.ts-Date.now())/60000));
  var hi=ev.impact==='High';
  var c=hi?RED:GOLD;
  var b=div('');b.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:10px;margin-bottom:12px;background:'+c+'14;border:1px solid '+c+'44;animation:'+(hi&&mins<=15?'wpulse 1.2s infinite':'none');
  var lt=span('');lt.style.cssText='font-size:12px;color:'+c+';font-weight:700';
  lt.textContent='⚠ '+ev.title+' in '+mins+' min';
  var rt=span('mono');rt.style.cssText='font-size:10px;color:'+c+'aa';
  rt.textContent=(ev.impact==='High'?'HIGH IMPACT':'MED IMPACT')+(ev.forecast?' · fcst '+ev.forecast:'');
  b.appendChild(lt);b.appendChild(rt);
  // Spoken warning once per event, at ≤30 min out
  var key=ev.title+ev.ts;
  if(mins<=30&&!S.ecoWarned[key]){
    S.ecoWarned[key]=1;
    speak('Warning Sir. '+ev.title+' releases in '+mins+' minutes. '+(hi?'High impact — expect volatility on NQ.':''),null);
  }
  return b;
}
// Rolling 20-day NQ↔SOX correlation of daily returns (context for how much to trust confluence)
function fetchCorr(){
  if(Date.now()-S.corrLastFetch<21600000&&S.nqSoxCorr!==null)return; // refresh every 6h
  S.corrLastFetch=Date.now();
  var PROXIES=['https://corsproxy.io/?','https://api.allorigins.win/raw?url=','https://api.codetabs.com/v1/proxy?quest='];
  function getCloses(sym,cb){
    var url='https://query1.finance.yahoo.com/v8/finance/chart/'+sym+'?interval=1d&range=2mo';
    var pi=0;
    function tryP(){
      if(pi>=PROXIES.length){cb(null);return;}
      fetch(PROXIES[pi]+encodeURIComponent(url),{cache:'no-store'}).then(function(r){
        pi++;
        if(!r.ok){tryP();return;}
        r.text().then(function(t){
          try{
            var j=JSON.parse(t);var res=j.chart&&j.chart.result&&j.chart.result[0];
            var cl=res&&res.indicators&&res.indicators.quote&&res.indicators.quote[0]&&res.indicators.quote[0].close;
            if(cl&&cl.length){cb(cl.filter(function(x){return x&&x>0;}));return;}
            tryP();
          }catch(e){tryP();}
        }).catch(function(){tryP();});
      }).catch(function(){pi++;tryP();});
    }
    tryP();
  }
  getCloses('^NDX',function(nq){
    if(!nq){return;}
    getCloses('^SOX',function(sox){
      if(!sox)return;
      var n=Math.min(nq.length,sox.length,21);
      if(n<10)return;
      var a=nq.slice(-n),b=sox.slice(-n),ra=[],rb=[];
      for(var i=1;i<n;i++){ra.push((a[i]-a[i-1])/a[i-1]);rb.push((b[i]-b[i-1])/b[i-1]);}
      var ma=ra.reduce(function(s,x){return s+x;},0)/ra.length,mb=rb.reduce(function(s,x){return s+x;},0)/rb.length;
      var cov=0,va=0,vb=0;
      for(var j2=0;j2<ra.length;j2++){cov+=(ra[j2]-ma)*(rb[j2]-mb);va+=Math.pow(ra[j2]-ma,2);vb+=Math.pow(rb[j2]-mb,2);}
      if(va>0&&vb>0)S.nqSoxCorr=cov/Math.sqrt(va*vb);
    });
  });
}
// After a tracked event's release time passes, speak actual vs forecast (only if feed provides 'actual')
function checkEcoOutcomes(){
  var now=Date.now();
  S.ecoEvents.forEach(function(e){
    if(!e.actual)return; // feed didn't provide the release value
    if(e.ts>now||now-e.ts>7200000)return; // only within 2h after release
    var key='out'+e.title+e.ts;
    if(S.ecoAnnounced[key])return;
    S.ecoAnnounced[key]=1;
    var msg=e.title+' released: actual '+e.actual+(e.forecast?', forecast was '+e.forecast:'')+'.';
    speak(msg+' Watch NQ reaction Sir.',null);
    notify('📊 '+msg,BLUE);
  });
}
// NQ vs Semis divergence check — narrow-breadth early warning
function checkDivergence(){
  var nq=S.mktData.NQ,semis=S.mktData.SOX||S.mktData.NVDA;
  if(!nq||!semis)return;
  var gap=nq.change-semis.change;
  var opposite=(nq.change>0.2&&semis.change<-0.2)||(nq.change<-0.2&&semis.change>0.2);
  if((opposite||Math.abs(gap)>1.5)&&Date.now()-S.divWarned>1800000){ // max once per 30 min
    S.divWarned=Date.now();
    var lbl2=S.mktData.SOX?'semiconductors':'Nvidia';
    speak('Divergence alert Sir. NQ is '+(nq.change>=0?'up':'down')+' '+f2(Math.abs(nq.change))+' percent while '+lbl2+' '+(semis.change>=0?'is up':'is down')+' '+f2(Math.abs(semis.change))+' percent. Breadth may be narrow.',null);
    notify('⚠ NQ / semis divergence: '+f2(gap)+'% gap',GOLD);
  }
}
function genReport(){
  if(!S.apiKey){notify('Add Gemini API key in Platforms.',GOLD);return;}
  notify('Generating full 3-asset briefing...',PURPLE);
  S.mktReport='';S.mktRLoad=true;
  if(S.view==='markets')navigate('markets');
  var now=new Date();var dateStr=now.toDateString();
  var ASSETS=[
    {k:'ES',name:'S&P 500 Futures (ES)'},
    {k:'NQ',name:'Nasdaq 100 Futures (NQ)'},
    {k:'XAU',name:'Gold (XAUUSD)'}
  ];
  var results={};
  var idx2=0;
  function dataFor(k){
    var d=S.mktData[k];
    if(!d)return '(Live price data unavailable - use your knowledge of recent '+k+' market conditions.)';
    var p=pivots(d.h,d.l,d.c);
    var s='Price '+f2(d.price)+' ('+d.change+'%) OHLC '+f2(d.o)+'/'+f2(d.h)+'/'+f2(d.l)+'/'+f2(d.c)+'\nClassic Pivots: R3='+f2(p.r3)+' R2='+f2(p.r2)+' R1='+f2(p.r1)+' PP='+f2(p.pp)+' S1='+f2(p.s1)+' S2='+f2(p.s2)+' S3='+f2(p.s3)+'\nCamarilla: H4='+f2(p.ch4)+' H3='+f2(p.ch3)+' L3='+f2(p.cl3)+' L4='+f2(p.cl4);
    if(k==='NQ'){
      var cf=computeConfluence(S.mktData);
      if(cf&&cf.max){
        s+='\nCONFLUENCE STACK ('+cf.score+'/'+cf.max+'): '+cf.checks.map(function(c){return c.l+' '+(c.pass?'YES':'NO')+' ('+c.val+')';}).join('; ');
        var ne=nextEcoEvent(240);
        if(ne)s+='\nUPCOMING EVENT: '+ne.title+' ('+ne.impact+' impact) in '+Math.round((ne.ts-Date.now())/60000)+' min'+(ne.forecast?', forecast '+ne.forecast:'');
        s+='\nWeigh the confluence stack heavily in your trade ideas: high score = higher conviction, low score = advise caution or smaller size.';
      }
    }
    return s;
  }
  function renderProgress(){
    S.mktReport=ASSETS.map(function(a){
      if(results[a.k]==='loading')return '═══ '+a.name+' ═══\n⏳ Analyzing...\n';
      if(results[a.k])return results[a.k];
      return '═══ '+a.name+' ═══\n(queued)\n';
    }).join('\n\n')+(results._verdict?'\n\n═══ JARVIS VERDICT ═══\n'+results._verdict:'');
    if(S.view==='markets')navigate('markets');
  }
  function doAsset(){
    if(idx2>=ASSETS.length){doVerdict();return;}
    var a=ASSETS[idx2];
    results[a.k]='loading';renderProgress();
    var sys='You are JARVIS, an elite institutional market analyst. Today is '+dateStr+'. Give a sharp, specific briefing for ONE asset only. Use real price levels. Be concise but complete.';
    var prompt='Analyze '+a.name+' and give a complete briefing with these sections:\n\n'+
      'MARKET DATA:\n'+dataFor(a.k)+'\n\n'+
      'Provide:\n'+
      '1. PREVIOUS SESSION RECAP - what happened, key moves, sentiment\n'+
      '2. MARKET STRUCTURE - trend bias (bullish/bearish/ranging), where price sits\n'+
      '3. BIG BANK / MARKET MAKER LEVELS - liquidity pools above & below, stop hunt zones, order blocks, where smart money orders rest\n'+
      '4. KEY PRICE AREAS - 3 specific levels with WHY each matters\n'+
      '5. PIVOT ANALYSIS - above or below PP, most relevant R/S levels\n'+
      '6. TWO TRADE IDEAS - each: direction, entry zone, Target 1, Target 2, invalidation, confluence\n'+
      '7. RISK FACTORS\n\n'+
      'Start with a header line: ═══ '+a.name+' ═══';
    geminiCall(sys,[{role:'user',parts:[{text:prompt}]}],function(data){
      var txt=geminiText(data)||('═══ '+a.name+' ═══\nAnalysis unavailable.');
      results[a.k]=txt;idx2++;renderProgress();
      setTimeout(doAsset,400);
    },function(err){
      results[a.k]='═══ '+a.name+' ═══\n⚠ Failed: '+err;idx2++;renderProgress();
      setTimeout(doAsset,400);
    },4096);
  }
  function doVerdict(){
    var sys='You are JARVIS. Based on the 3 asset briefings, give your single highest-conviction trade idea for the week. Be specific. Say Sir once.';
    var summary=ASSETS.map(function(a){return a.name+': '+(results[a.k]||'').slice(0,300);}).join('\n\n');
    geminiCall(sys,[{role:'user',parts:[{text:'Based on these briefings, what is your top conviction trade this week with full details (entry, targets, stop, reasoning)?\n\n'+summary}]}],function(data){
      results._verdict=geminiText(data)||'No verdict available.';
      S.mktRLoad=false;renderProgress();
      var spoken='Market briefing complete Sir. '+(results._verdict||'').replace(/[#*_═]/g,'').slice(0,400);
      speak(spoken,null);
    },function(err){
      S.mktRLoad=false;renderProgress();
    },2048);
  }
  doAsset();
}

function jarvisGreeting(){
  var hr=new Date().getHours();
  var greeting=hr<12?'Good morning':hr<18?'Good afternoon':'Good evening';
  var msg=greeting+' Sir. ';
  if(S.trades.length){
    var total=S.trades.reduce(function(s,t){return s+safe(t.pnl);},0);
    var todayTrades=S.trades.filter(function(t){return t.date===today();});
    if(todayTrades.length){
      var todayPnl=todayTrades.reduce(function(s,t){return s+safe(t.pnl);},0);
      msg+=todayTrades.length+(todayTrades.length===1?' trade':' trades')+' logged today, '+(todayPnl>=0?'up ':'down ')+Math.abs(Math.round(todayPnl))+' dollars. ';
    }
    msg+='Your total stands at '+Math.round(total)+' dollars. JARVIS ready.';
  } else {
    msg+='All systems operational. Ready when you are.';
  }
  return msg;
}
